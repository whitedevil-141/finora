<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page App</title>
    <script type="text/javascript">
      // Redirect to index.html with the original path preserved in hash
      // This allows client-side React Router to handle the route
      var l = window.location;
      var path = l.pathname;
      var search = l.search ? l.search : '';
      var hash = l.hash;
      
      // Redirect to /finora/ with the path stored in the hash for React Router
      l.replace('/finora/index.html#' + path + search + hash);
    </script>
  </head>
  <body></body>
</html>
