<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page App</title>
    <script type="text/javascript">
      // Redirect to index.html preserving the hash (for OAuth callbacks and client-side routes)
      var l = window.location;
      var hash = l.hash;
      var path = l.pathname;
      var search = l.search ? l.search : '';
      
      // If there's already a hash (e.g., OAuth callback with id_token), preserve it
      if (hash) {
        l.replace('/finora/index.html' + hash);
      } else {
        // Otherwise, convert the path to a hash for client-side routing
        // This handles routes like /finora/oauth-callback that result in 404
        l.replace('/finora/index.html#' + path.replace(/^\/finora/, '') + search);
      }
    </script>
  </head>
  <body></body>
</html>
